<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>For Bonna ✦ A Quiet Corner</title>
    <meta
      name="description"
      content="A private space, made for her."
    />
    <meta name="theme-color" content="#2d0a1e" />
    <meta name="robots" content="noindex, nofollow" />

    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦋</text></svg>"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/admin.css" />
  </head>
  <body class="admin-body">
    <!-- Preloader -->
    <div class="preloader" id="preloader">
      <div class="preloader-spinner"></div>
      <span class="preloader-text">LOADING<span class="dots"></span></span>
    </div>

    <!-- Background -->
    <div class="page-background"></div>
    <div class="scanlines"></div>

    <main class="login-page-container">
      <div class="login-card retro-card">
        <!-- Mascot -->
        <div class="login-mascot-area">
          <img
            src="./assets/bonna.png"
            alt="Bonna mascot"
            class="login-mascot"
          />
          <span class="sparkle sparkle-1"></span>
          <span class="sparkle sparkle-2"></span>
          <span class="sparkle sparkle-3"></span>
        </div>

        <!-- Heading -->
        <h1 class="site-title login-title">FOR<br />BONNA</h1>
        <p class="login-subtitle" id="login-rotating-subtitle">A quiet corner of the internet, made for you.</p>
        <p class="login-flavor">
          The key is where it has always been, mon amour.
        </p>

        <!-- Login Form -->
        <form id="login-form" class="login-form" autocomplete="off">
          <div class="login-form-group">
            <label class="admin-label" for="login-key">YOUR KEY</label>
            <div class="token-input-wrapper">
              <input
                type="password"
                id="login-key"
                class="admin-input login-key-input"
                placeholder="Enter your secret magic key..."
                autocomplete="current-password"
                spellcheck="false"
              />
              <button
                type="button"
                class="token-toggle"
                id="toggle-key"
                aria-label="Show/Hide key"
              >
                <i class="fa-solid fa-eye"></i>
              </button>
            </div>
          </div>

          <!-- Message area -->
          <div
            id="login-message"
            class="login-message"
            role="alert"
            aria-live="polite"
            style="display: none"
          ></div>

          <!-- Submit -->
          <button
            type="submit"
            class="cta-btn cta-btn-primary login-submit-btn"
            id="login-btn"
          >
            <i class="fa-solid fa-key"></i>
            <span>ENTER</span>
          </button>
        </form>

        <!-- Footer -->
        <div class="login-footer">
          <a href="index.html" class="login-back-link">
            <i class="fa-solid fa-arrow-left"></i>
            Back to Portfolio
          </a>
        </div>
      </div>
    </main>

    <script src="js/login.js?v=2"></script>
  </body>
</html>
