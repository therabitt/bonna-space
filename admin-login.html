<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>For Bonna ✦ A Quiet Corner</title>
    <meta name="description" content="A private space, made for her." />
    <meta name="theme-color" content="#2d0a1e" />
    <meta name="robots" content="noindex, nofollow" />

    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦋</text></svg>"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/admin.css" />
  </head>
  <body class="admin-body login-sanctuary-body">

    <!-- Preloader -->
    <div class="preloader" id="preloader">
      <div class="constellation-spinner">
        <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
          <circle cx="100" cy="100" r="80" class="cosmic-ring ring-1" />
          <circle cx="100" cy="100" r="60" class="cosmic-ring ring-2" />
          <circle cx="100" cy="100" r="40" class="cosmic-ring ring-3" />
          <path d="M 50,30 L 53,33 L 50,36 L 47,33 Z" class="sprinkle" style="animation-delay: 0.1s" />
          <path d="M 150,50 L 153,53 L 150,56 L 147,53 Z" class="sprinkle" style="animation-delay: 0.5s" />
          <path d="M 30,140 L 33,143 L 30,146 L 27,143 Z" class="sprinkle" style="animation-delay: 1.2s" />
          <path d="M 170,160 L 173,163 L 170,166 L 167,163 Z" class="sprinkle" style="animation-delay: 0.8s" />
          <path d="M 100,20 L 102,22 L 100,24 L 98,22 Z" class="sprinkle" style="animation-delay: 1.5s" />
          <path d="M 100,60 L 40,40 L 30,90 L 90,110 Z" class="constellation-path path-1" />
          <path d="M 90,110 L 50,150 L 80,170 L 100,130 Z" class="constellation-path path-2" />
          <path d="M 100,60 L 160,40 L 170,90 L 110,110 Z" class="constellation-path path-3" />
          <path d="M 110,110 L 150,150 L 120,170 L 100,130 Z" class="constellation-path path-4" />
          <path d="M 100,60 L 100,130" class="constellation-path path-core" />
          <path d="M 100,52 L 108,60 L 100,68 L 92,60 Z" class="constellation-star core-star" />
          <path d="M 100,122 L 108,130 L 100,138 L 92,130 Z" class="constellation-star core-star" />
          <path d="M 40,35 L 45,40 L 40,45 L 35,40 Z" class="constellation-star" style="animation-delay: 0.2s" />
          <path d="M 30,84 L 36,90 L 30,96 L 24,90 Z" class="constellation-star" style="animation-delay: 0.4s" />
          <path d="M 90,106 L 94,110 L 90,114 L 86,110 Z" class="constellation-star" style="animation-delay: 0.6s" />
          <path d="M 160,35 L 165,40 L 160,45 L 155,40 Z" class="constellation-star" style="animation-delay: 0.3s" />
          <path d="M 170,84 L 176,90 L 170,96 L 164,90 Z" class="constellation-star" style="animation-delay: 0.5s" />
        </svg>
      </div>
      <span class="preloader-text">LOADING_MEMORIES<span class="dots"></span></span>
    </div>

    <!-- Aurora Background Layers -->
    <div class="aurora-bg" aria-hidden="true">
      <div class="aurora-layer aurora-1"></div>
      <div class="aurora-layer aurora-2"></div>
      <div class="aurora-layer aurora-3"></div>
    </div>
    <div class="scanlines" aria-hidden="true"></div>

    <!-- Main Layout -->
    <main class="sanctuary-layout" id="sanctuary-main">

      <!-- LEFT: Poetic Column -->
      <div class="sanctuary-left" aria-label="A message for you">
        <div class="sanctuary-left-inner">
          <p class="sanctuary-eyebrow" aria-hidden="true">✦ &nbsp; private entrance &nbsp; ✦</p>

          <h1 class="sanctuary-title">FOR<br>BONNA</h1>

          <div class="sanctuary-quote-area" aria-live="polite">
            <p class="sanctuary-quote" id="sanctuary-quote-text"></p>
            <span class="sanctuary-cursor" aria-hidden="true">|</span>
          </div>

          <p class="sanctuary-flavor" id="sanctuary-flavor">
            The key is where it has always been, <em>mon amour</em>.
          </p>

          <div class="sanctuary-deco-diamonds" aria-hidden="true">
            <span class="deco-diamond">◆</span>
            <span class="deco-diamond">◇</span>
            <span class="deco-diamond">◆</span>
          </div>
        </div>
      </div>

      <!-- RIGHT: Form Column -->
      <div class="sanctuary-right">
        <div class="sanctuary-form-box">
          <p class="sanctuary-form-label">YOUR KEY</p>

          <form id="login-form" class="sanctuary-form" autocomplete="off">
            <div class="sanctuary-input-group">
              <input
                type="password"
                id="login-key"
                class="sanctuary-input"
                placeholder="enter your secret key..."
                autocomplete="current-password"
                spellcheck="false"
                aria-label="Secret key"
              />
              <button
                type="button"
                class="sanctuary-toggle"
                id="toggle-key"
                aria-label="Show/Hide key"
              >
                <i class="fa-solid fa-eye"></i>
              </button>
            </div>

            <!-- Message area -->
            <div
              id="login-message"
              class="sanctuary-message"
              role="alert"
              aria-live="polite"
              style="display: none"
            ></div>

            <button
              type="submit"
              class="sanctuary-submit"
              id="login-btn"
            >
              <span class="sanctuary-submit-text">ENTER</span>
              <i class="fa-solid fa-arrow-right sanctuary-submit-icon"></i>
            </button>
          </form>

          <a href="index.html" class="sanctuary-back-link">
            <i class="fa-solid fa-arrow-left"></i>
            back to portfolio
          </a>
        </div>
      </div>

    </main>

    <script src="js/login.js?v=3"></script>
  </body>
</html>
