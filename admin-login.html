<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>For Bonna ✦ A Quiet Corner</title>
    <meta
      name="description"
      content="A private space, made for her."
    />
    <meta name="theme-color" content="#2d0a1e" />
    <meta name="robots" content="noindex, nofollow" />

    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦋</text></svg>"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/admin.css" />
  </head>
  <body class="admin-body">
    <!-- Preloader -->
    <div class="preloader" id="preloader">
      <div class="constellation-spinner">
        <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
          <!-- Cosmic Rings -->
          <circle cx="100" cy="100" r="80" class="cosmic-ring ring-1" />
          <circle cx="100" cy="100" r="60" class="cosmic-ring ring-2" />
          <circle cx="100" cy="100" r="40" class="cosmic-ring ring-3" />

          <!-- Butterfly Constellation Paths -->
          <path d="M 100,60 L 40,40 L 30,90 L 90,110 Z" class="constellation-path path-1" />
          <path d="M 90,110 L 50,150 L 80,170 L 100,130 Z" class="constellation-path path-2" />
          <path d="M 100,60 L 160,40 L 170,90 L 110,110 Z" class="constellation-path path-3" />
          <path d="M 110,110 L 150,150 L 120,170 L 100,130 Z" class="constellation-path path-4" />
          <path d="M 100,60 L 100,130" class="constellation-path path-core" />
          
          <!-- Butterfly Nodes -->
          <circle cx="100" cy="60" r="5" class="constellation-star core-star" />
          <circle cx="100" cy="130" r="5" class="constellation-star core-star" />
          <circle cx="40" cy="40" r="3" class="constellation-star" style="animation-delay: 0.2s" />
          <circle cx="30" cy="90" r="4" class="constellation-star" style="animation-delay: 0.4s" />
          <circle cx="90" cy="110" r="3" class="constellation-star" style="animation-delay: 0.6s" />
          <circle cx="50" cy="150" r="3" class="constellation-star" style="animation-delay: 0.8s" />
          <circle cx="80" cy="170" r="4" class="constellation-star" style="animation-delay: 1.0s" />
          <circle cx="160" cy="40" r="3" class="constellation-star" style="animation-delay: 0.3s" />
          <circle cx="170" cy="90" r="4" class="constellation-star" style="animation-delay: 0.5s" />
          <circle cx="110" cy="110" r="3" class="constellation-star" style="animation-delay: 0.7s" />
          <circle cx="150" cy="150" r="3" class="constellation-star" style="animation-delay: 0.9s" />
          <circle cx="120" cy="170" r="4" class="constellation-star" style="animation-delay: 1.1s" />
        </svg>
      </div>
      <span class="preloader-text">LOADING_MEMORIES<span class="dots"></span></span>
    </div>

    <!-- Background -->
    <div class="page-background"></div>
    <div class="scanlines"></div>

    <main class="login-page-container">
      <div class="login-card retro-card">
        <!-- Mascot -->
        <div class="login-mascot-area">
          <span class="sparkle sparkle-1"></span>
          <span class="sparkle sparkle-2"></span>
          <span class="sparkle sparkle-3"></span>
        </div>

        <!-- Heading -->
        <h1 class="site-title login-title">FOR<br />BONNA</h1>
        <p class="login-subtitle" id="login-rotating-subtitle">A quiet corner of the internet, made for you.</p>
        <p class="login-flavor">
          The key is where it has always been, mon amour.
        </p>

        <!-- Login Form -->
        <form id="login-form" class="login-form" autocomplete="off">
          <div class="login-form-group">
            <label class="admin-label" for="login-key">YOUR KEY</label>
            <div class="token-input-wrapper">
              <input
                type="password"
                id="login-key"
                class="admin-input login-key-input"
                placeholder="Enter your secret magic key..."
                autocomplete="current-password"
                spellcheck="false"
              />
              <button
                type="button"
                class="token-toggle"
                id="toggle-key"
                aria-label="Show/Hide key"
              >
                <i class="fa-solid fa-eye"></i>
              </button>
            </div>
          </div>

          <!-- Message area -->
          <div
            id="login-message"
            class="login-message"
            role="alert"
            aria-live="polite"
            style="display: none"
          ></div>

          <!-- Submit -->
          <button
            type="submit"
            class="cta-btn cta-btn-primary login-submit-btn"
            id="login-btn"
          >
            <i class="fa-solid fa-key"></i>
            <span>ENTER</span>
          </button>
        </form>

        <!-- Footer -->
        <div class="login-footer">
          <a href="index.html" class="login-back-link">
            <i class="fa-solid fa-arrow-left"></i>
            Back to Portfolio
          </a>
        </div>
      </div>
    </main>

    <script src="js/login.js?v=2"></script>
  </body>
</html>
