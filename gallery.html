<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery ✦ BONNA</title>
  <meta name="description" content="Bonna's complete art collection - OCs, fanarts, pixel art, and commissions." />
  <meta name="theme-color" content="#2d0a1e" />

  <!-- Open Graph / Social -->
  <meta property="og:site_name" content="BONNA ✦ Digital Artist" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Art Gallery ✦ BONNA" />
  <meta property="og:description" content="Browse Bonna's complete collection of OCs, fanarts, and commission works." />
  <meta property="og:image" content="assets/bonna.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Art Gallery ✦ BONNA" />
  <meta name="twitter:description"
    content="Browse Bonna's complete collection of OCs, fanarts, and commission works." />

  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦋</text></svg>" />

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css?v=1.6" />
</head>

<body>
  <a class="skip-link" href="#main-content">Skip to content</a>
  <div class="scroll-progress" aria-hidden="true"></div>
  <div class="page-transition-overlay"></div>

  <!-- Preloader -->
  <div class="preloader" id="preloader">
    <div class="preloader-spinner"></div>
    <span class="preloader-text">LOADING GALLERY<span class="dots"></span></span>
  </div>

  <!-- Background Parallax Layers -->
  <div class="page-background"></div>
  <div class="scanlines"></div>
  <div class="parallax-bg" id="parallax-bg">
    <div class="parallax-layer parallax-layer-1"></div>
    <div class="parallax-layer parallax-layer-2"></div>
    <div class="parallax-layer parallax-layer-3"></div>
  </div>

  <!-- Site Navigation -->
  <nav class="site-nav" id="site-nav" aria-label="Site navigation">
    <div class="nav-inner">
      <a href="index.html" class="nav-brand" aria-label="Bonna - Home">
        <img src="assets/bonna.png" alt="BONNA" class="nav-brand-icon" style="width: 54px" />
        <span class="nav-brand-name">BONNA</span>
      </a>
      <button class="nav-hamburger" id="nav-hamburger" aria-label="Toggle navigation" aria-expanded="false">
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
      </button>
      <div class="nav-links" id="nav-links">
        <a href="index.html" class="nav-link" data-page="index">
          <i class="fa-solid fa-house"></i>
          <span>Home</span>
        </a>
        <a href="gallery.html" class="nav-link" data-page="gallery">
          <i class="fa-solid fa-images"></i>
          <span>Gallery</span>
        </a>
        <a href="commission.html" class="nav-link" data-page="commission">
          <i class="fa-solid fa-store"></i>
          <span>Commission</span>
        </a>
        <a href="tos.html" class="nav-link" data-page="tos">
          <i class="fa-solid fa-file-contract"></i>
          <span>ToS</span>
        </a>
      </div>
    </div>
  </nav>

  <main class="main-container" id="main-content" tabindex="-1">
    <!-- Header -->
    <header class="header-section reveal" style="margin-bottom: var(--space-xl)">
      <h1 class="site-title">ART GALLERY</h1>
      <p class="site-tagline" style="visibility: visible">
        A collection of OCs, fanarts, and commission works
      </p>
    </header>

    <div class="section-divider"></div>

    <!-- Filter Section -->
    <section class="gallery-filter-section reveal">
      <!-- Row 1: Style (Category) Filters — Full Render, Pixel, Sketch, etc. -->
      <div class="gallery-filters-group">
        <span class="gallery-filter-label">✦ STYLE</span>
        <div class="gallery-filter-container">
          <button class="gallery-filter-btn active" data-filter="all" data-filter-kind="category">
            <i class="fa-solid fa-border-all"></i> All
          </button>
          <div id="gallery-filters-categories">
            <!-- Dynamic category filters injected by JS -->
          </div>
        </div>
      </div>

      <!-- Row 2: Type Filters — Chibi, Bust, Half Body, etc. -->
      <div class="gallery-filters-group">
        <span class="gallery-filter-label">✦ TYPE</span>
        <div class="gallery-filter-container">
          <button class="gallery-filter-btn active" data-filter="all" data-filter-kind="type">
            <i class="fa-solid fa-border-all"></i> All
          </button>
          <div id="gallery-filters-dynamic">
            <!-- Dynamic type filters injected by JS -->
          </div>
        </div>
      </div>

      <!-- Row 3: Sort -->
      <div class="gallery-filters-group">
        <span class="gallery-filter-label">✦ SORT</span>
        <div class="gallery-filter-container">
          <button class="gallery-sort-btn active" data-sort="most-liked">
            <i class="fa-solid fa-heart"></i> Most Liked
          </button>
          <button class="gallery-sort-btn" data-sort="newest">
            <i class="fa-solid fa-clock"></i> Newest
          </button>
          <button class="gallery-sort-btn" data-sort="oldest">
            <i class="fa-solid fa-history"></i> Oldest
          </button>
        </div>
      </div>
    </section>

    <!-- Gallery Stats -->
    <div class="gallery-stats reveal" id="gallery-stats"
      style="text-align: center; font-family: var(--font-pixel); font-size: 0.5rem; color: var(--text-muted); margin-bottom: var(--space-md); text-transform: uppercase; letter-spacing: 1px;">
      <!-- Dynamic text: Showing X of Y Artworks -->
    </div>

    <!-- Gallery Grid -->
    <section class="gallery-section reveal">
      <div class="gallery-grid" id="gallery-grid">
        <!-- Gallery items injected by script.js -->
        <div class="preloader-mini" style="
              text-align: center;
              color: var(--clr-coral);
              font-family: var(--font-pixel);
              font-size: 0.6rem;
              padding: var(--space-xl);
            ">
          <div class="preloader-spinner" style="width: 30px; height: 30px; margin: 0 auto var(--space-md)"></div>
          SYNCING ARTWORKS...
        </div>
      </div>

      <!-- Load More Button -->
      <div class="gallery-load-more-container">
        <button class="cta-btn cta-btn-secondary gallery-load-more-btn" id="gallery-load-more" style="display: none">
          <i class="fa-solid fa-chevron-down"></i>
          <span>Load More</span>
        </button>
      </div>

      <!-- No Results Message -->
      <div class="gallery-no-results" id="gallery-no-results" style="display: none">
        <div class="retro-card" style="text-align: center; padding: var(--space-2xl)">
          <i class="fa-solid fa-wand-magic-sparkles" style="
                font-size: 3rem;
                color: var(--clr-coral);
                margin-bottom: var(--space-md);
              "></i>
          <h3 style="
                font-family: var(--font-pixel);
                font-size: 0.8rem;
                margin-bottom: var(--space-sm);
              ">
            No artworks found
          </h3>
          <p style="color: var(--text-secondary)">
            Try selecting a different filter!
          </p>
        </div>
      </div>
    </section>

    <!-- Footer CTA -->
    <div class="section-divider"></div>
    <section class="mystery-section reveal">
      <h3 class="section-header" style="margin-bottom: var(--space-lg)">
        <span class="decorative">✦</span>
        LIKE WHAT YOU SEE?
        <span class="decorative">✦</span>
      </h3>
      <div class="cta-buttons">
        <a href="commission.html" class="cta-btn cta-btn-primary">
          <i class="fa-solid fa-store"></i>
          <span>Commission Me</span>
        </a>
      </div>
    </section>

    <!-- Sound Controller -->
    <div class="sound-controller" id="sound-controls">
      <button class="sound-toggle-btn tooltip" id="sound-toggle" data-tooltip="Sound ON/OFF" aria-label="Toggle Sound">
        <i class="fa-solid fa-volume-xmark"></i>
      </button>
    </div>

    <!-- Scroll to Top -->
    <button class="scroll-to-top" id="scroll-to-top" aria-label="Scroll to top">
      <i class="fa-solid fa-chevron-up"></i>
    </button>


    <!-- Lightbox Modal (Retro OS Window Style) -->
    <div class="gallery-lightbox" id="gallery-lightbox" aria-hidden="true">
      <div class="gallery-lightbox-backdrop"></div>

      <div class="gallery-lightbox-window">
        <!-- Window Title Bar -->
        <div class="gallery-window-header">
          <div class="window-title">
            <i class="fa-solid fa-image"></i> view_artwork.exe
          </div>
          <div class="window-controls">
            <button class="gallery-lightbox-nav gallery-lightbox-prev" aria-label="Previous">
              <i class="fa-solid fa-chevron-left"></i>
            </button>
            <button class="gallery-lightbox-nav gallery-lightbox-next" aria-label="Next">
              <i class="fa-solid fa-chevron-right"></i>
            </button>
            <button class="gallery-lightbox-close" aria-label="Close window">
              <i class="fa-solid fa-xmark"></i>
            </button>
          </div>
        </div>

        <div class="gallery-window-body">
          <!-- Main Content Area -->
          <div class="gallery-window-content">
            <div class="gallery-window-main">
              <!-- Image Section -->
              <div class="gallery-lightbox-image-container">
                <img src="" alt="" class="gallery-lightbox-image" id="lightbox-image" />
                <div class="gallery-lightbox-loading">
                  <div class="preloader-spinner"></div>
                </div>
                <div class="crt-overlay"></div>
              </div>

              <!-- Info Section -->
              <div class="gallery-lightbox-info">
                <div class="info-header">
                  <h3 class="gallery-lightbox-title" id="lightbox-title"></h3>
                  <span class="gallery-lightbox-type" id="lightbox-type"></span>
                </div>
                <div class="section-divider" style="margin: var(--space-sm) 0; opacity: 0.3;"></div>
                <p class="gallery-lightbox-desc" id="lightbox-desc"></p>
                <div class="gallery-lightbox-like-bar">
                  <button class="gallery-lightbox-like-btn" id="lightbox-like-btn" aria-label="Like this artwork">
                    <i class="fa-regular fa-heart"></i>
                  </button>
                  <span class="gallery-lightbox-like-count" id="lightbox-like-count">0</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="js/utils.js?v=1.6"></script>
  <script src="js/script.js?v=1.6"></script>
</body>

</html>
